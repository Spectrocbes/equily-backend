name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-analyze:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove broken system JDK
        run: |
          sudo rm -rf /usr/lib/jvm/temurin-21-jdk-amd64 || true
          sudo rm -rf /usr/lib/jvm/temurin-* || true

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Verify environment
        run: |
          echo "JAVA_HOME: $JAVA_HOME"
          which java
          java -version
          ./mvnw --version

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build, test & coverage
        run: ./mvnw clean verify --no-transfer-progress

      - name: SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw sonar:sonar \
            --no-transfer-progress \
            -Dsonar.organization=Spectrocbes \
            -Dsonar.projectKey=Spectrocbes_equily-backend \
            -Dsonar.host.url=https://sonarcloud.io
