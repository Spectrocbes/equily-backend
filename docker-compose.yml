services:
  postgres:
    image: postgres:16-alpine
    container_name: equily-postgres
    environment:
      POSTGRES_DB: equily_db
      POSTGRES_USER: equily
      POSTGRES_PASSWORD: equily_local
    ports:
      - "5432:5432"
    volumes:
      - equily_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U equily -d equily_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  equily_postgres_data: