spring:
  application:
    name: equily-backend
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: portfolio
  flyway:
    enabled: true
    locations:
      - classpath:db/migration/portfolio
      - classpath:db/migration/identity
    schemas: portfolio
    default-schema: portfolio

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/equily_db
    username: equily
    password: equily_local
    driver-class-name: org.postgresql.Driver

jwt:
  private-key-path: jwt-private.pem
  public-key-path: jwt-public.pem

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

jwt:
  private-key-path: ${JWT_PRIVATE_KEY_PATH}
  public-key-path: ${JWT_PUBLIC_KEY_PATH}
